services:
  - type: web
    name: customers-service
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: customers-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: customers-db
    region: frankfurt
    plan: starter
    databaseName: customers
    user: customers_user
